<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MİS - Mera İzleme Sistemi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    .stat-kart{background:#fff;border:1px solid #e2e8e4;border-radius:12px;padding:1.25rem;text-align:center;}
    .stat-deger{font-size:2rem;font-weight:700;color:#0F6E56;line-height:1;}
    .stat-etiket{font-size:12px;color:#4a6358;margin-top:4px;}
    .uyari-kart{border-radius:10px;padding:.85rem 1rem;margin-bottom:.5rem;border-left:4px solid;}
    .uyari-vasif{background:#fff3cd;border-left-color:#ffc107;}
    .uyari-tahsis{background:#f8d7da;border-left-color:#dc3545;}
  </style>
</head>
<body>
<div class="d-flex" id="wrapper">
  <div id="mis-sidebar-mount"></div>
  <div id="page-content" class="flex-grow-1">
    <nav class="navbar mis-topbar px-3">
      <button class="btn btn-sm mis-sidebar-toggle" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
      <span class="mis-topbar-title">Ana Sayfa</span>
    </nav>
    <main class="mis-main p-4">

      <!-- İstatistikler -->
      <div class="row g-3 mb-4" id="stat-satiri">
        <div class="col-6 col-md-3"><div class="stat-kart"><div class="stat-deger" id="st-toplam">-</div><div class="stat-etiket">Toplam Mera</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-kart"><div class="stat-deger text-success" id="st-aktif">-</div><div class="stat-etiket">Aktif</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-kart"><div class="stat-deger text-warning" id="st-vasif-uyari">-</div><div class="stat-etiket">Vasıf Uyarısı</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-kart"><div class="stat-deger text-danger" id="st-tahsis-uyari">-</div><div class="stat-etiket">Tahsis Uyarısı</div></div></div>
      </div>

      <!-- Uyarılar -->
      <div id="uyari-bolumu" class="d-none mb-4">
        <div class="mis-card">
          <div class="mis-card-header"><i class="bi bi-exclamation-triangle text-warning"></i><span class="title">Dikkat Gerektiren Kayıtlar</span></div>
          <div id="uyari-listesi"></div>
        </div>
      </div>

      <!-- Hızlı erişim -->
      <div class="row g-3">
        <div class="col-md-4">
          <a href="/mera/" class="text-decoration-none">
            <div class="mis-card d-flex align-items-center gap-3 p-3">
              <i class="bi bi-geo-alt fs-2 text-success"></i>
              <div><div class="fw-semibold">Mera Modülü</div><div class="small text-muted">Parsel kayıtları, harita, notlar</div></div>
            </div>
          </a>
        </div>
        <div class="col-md-4">
          <a href="/bbhb/" class="text-decoration-none">
            <div class="mis-card d-flex align-items-center gap-3 p-3">
              <i class="bi bi-calculator fs-2 text-success"></i>
              <div><div class="fw-semibold">BBHB Hesaplayıcı</div><div class="small text-muted">Büyükbaş hayvan birimi hesaplama</div></div>
            </div>
          </a>
        </div>
        <div class="col-md-4">
          <a href="/ayarlar/" class="text-decoration-none">
            <div class="mis-card d-flex align-items-center gap-3 p-3">
              <i class="bi bi-gear fs-2 text-success"></i>
              <div><div class="fw-semibold">Ayarlar</div><div class="small text-muted">Drive, kategoriler, tablolar</div></div>
            </div>
          </a>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="/js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
(d.tahsis_uyarilar||[]).forEach(m => {
      const kalan = Math.ceil((new Date(m.tahsis_durumu_bitis) - new Date()) / 86400000);
      uyarilar.push(`<div class="uyari-kart uyari-tahsis"><strong><a href="/mera/detay.html?id=${m._id}" class="text-decoration-none">${m.il_ad}/${m.mahalle_ad} Ada:${m.ada||'-'} Parsel:${m.parsel}</a></strong> — Tahsis belgesi <strong>${kalan} gün</strong> sonra sona eriyor</div>`);
    });
    if (uyarilar.length) {
      document.getElementById('uyari-bolumu').classList.remove('d-none');
      document.getElementById('uyari-listesi').innerHTML = uyarilar.join('');
    }
  } catch {}
};
loadIstatistik();
</script>
</body>
</html>
