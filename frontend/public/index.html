<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MİS - Mera İzleme Sistemi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div class="d-flex" id="wrapper">
  <nav id="sidebar" class="mis-sidebar d-flex flex-column">
    <a href="/" class="mis-sidebar-brand text-decoration-none">
      <i class="bi bi-tree-fill"></i><span>MİS</span>
    </a>
    <hr class="mis-sidebar-divider" />
    <ul class="nav flex-column mis-nav px-2">
      <li class="mis-nav-section">Modüller</li>
      <li class="nav-item">
        <a class="nav-link mis-nav-link" href="/bbhb/">
          <i class="bi bi-calculator"></i> <span>BBHB Hesaplayıcı</span>
        </a>
      </li>
      <li class="mis-nav-section mt-3">Sistem</li>
      <li class="nav-item">
        <a class="nav-link mis-nav-link" href="/ayarlar/">
          <i class="bi bi-gear"></i> <span>Ayarlar</span>
        </a>
      </li>
    </ul>
    <div class="mt-auto p-3 mis-sidebar-footer"><small class="text-muted">MİS v1.3.0</small></div>
  </nav>
  <div id="page-content" class="flex-grow-1">
    <nav class="navbar mis-topbar px-3">
      <button class="btn btn-sm mis-sidebar-toggle" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
      <span class="mis-topbar-title">Ana Sayfa</span>
    </nav>
    <main class="mis-main p-4">
      <div class="text-center mt-5 text-muted">
        <i class="bi bi-tree-fill fs-1 text-success"></i>
        <h4 class="mt-3">Mera İzleme Sistemine Hoş Geldiniz</h4>
        <p>Sol menüden bir modül seçin.</p>
        <a href="/bbhb/" class="btn btn-mis mt-2"><i class="bi bi-calculator me-2"></i>BBHB Hesaplayıcı</a>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('wrapper').classList.toggle('sidebar-collapsed');
  });
</script>
</body>
</html>
