<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yükleme Geçmişi - MİS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div class="d-flex" id="wrapper">

  <div id="mis-sidebar-mount"></div>

  <div id="page-content" class="flex-grow-1">
    <nav class="navbar mis-topbar px-3">
      <button class="btn btn-sm mis-sidebar-toggle" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
      <span class="mis-topbar-title">Yükleme Geçmişi</span>
      <div class="ms-auto">
        <a href="/modules/bbhb-yukle/" class="btn btn-sm btn-mis"><i class="bi bi-plus-lg me-1"></i>Yeni Yükleme</a>
      </div>
    </nav>

    <main class="mis-main p-4">
      <div class="mis-card">
        <div class="mis-card-header">
          <i class="bi bi-clock-history"></i>
          <span class="title">Geçmiş Yüklemeler</span>
          <span class="badge bg-secondary ms-2" id="toplam-badge">0</span>
        </div>
        <div id="tablo-alani">
          <div class="text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm text-success"></div>
            <span class="ms-2">Yükleniyor...</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="mis-toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="toast-msg"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '/api/bbhb-yukle';

const showToast = (msg, type = 'success') => {
  const el = document.getElementById('mis-toast');
  el.className = `toast align-items-center border-0 text-bg-${type}`;
  document.getElementById('toast-msg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el).show();
};

const loadListe = async () => {
  try {
    const r = await fetch(API);
    const json = await r.json();
    const kayitlar = json.data || [];
    document.getElementById('toplam-badge').textContent = kayitlar.length;

    if (kayitlar.length === 0) {
      document.getElementById('tablo-alani').innerHTML = `
        <div class="text-center py-5 text-muted">
          <i class="bi bi-inbox fs-1 d-block mb-2"></i>
          Henüz yükleme yok. <a href="/modules/bbhb-yukle/">Yeni yükleme yap</a>
        </div>`;
      return;
    }

    document.getElementById('tablo-alani').innerHTML = `
      <div class="table-responsive">
        <table class="table mis-table mb-0">
          <thead>
            <tr>
              <th>Başlık</th>
              <th>Dosyalar</th>
              <th class="text-end">Hayvan</th>
              <th class="text-end">BBHB</th>
              <th>Hes. Tarihi</th>
              <th>Yüklenme</th>
              <th>İşlemler</th>
            </tr>
          </thead>
          <tbody>
            ${kayitlar.map(k => `
              <tr>
                <td><strong>${k.baslik}</strong></td>
                <td><small class="text-muted">${(k.dosyalar||[]).join(', ')}</small></td>
                <td class="text-end">${k.ozet.toplam_hayvan}</td>
                <td class="text-end fw-bold text-success">${k.ozet.toplam_bbhb.toFixed(2)}</td>
                <td class="small text-muted">${k.hesaplama_tarihi || '-'}</td>
                <td class="small text-muted">${new Date(k.createdAt).toLocaleDateString('tr-TR')}</td>
                <td>
                  <div class="d-flex gap-1">
                    <a class="btn btn-xs btn-outline-secondary" href="/modules/bbhb-yukle/detay.html?id=${k._id}" title="Detay">
                      <i class="bi bi-eye"></i>
                    </a>
                    <button class="btn btn-xs btn-outline-danger" onclick="sil('${k._id}')" title="Sil">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch {
    document.getElementById('tablo-alani').innerHTML = '<div class="alert alert-danger">API bağlantısı kurulamadı.</div>';
  }
};

const sil = async (id) => {
  if (!confirm('Bu kayıt silinecek. Emin misiniz?')) return;
  try {
    const r = await fetch(`${API}/${id}`, { method: 'DELETE' });
    const json = await r.json();
    if (json.success) { showToast('Silindi.', 'success'); loadListe(); }
    else showToast(json.message || 'Hata.', 'danger');
  } catch { showToast('Sunucuya ulaşılamadı.', 'danger'); }
};

loadListe();
</script>
<style>.btn-xs { padding: 2px 6px; font-size: 12px; }</style>
</body>
</html>
