<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yükleme Detayı - MİS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div class="d-flex" id="wrapper">

  <div id="mis-sidebar-mount"></div>

  <div id="page-content" class="flex-grow-1">
    <nav class="navbar mis-topbar px-3">
      <button class="btn btn-sm mis-sidebar-toggle" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
      <span class="mis-topbar-title" id="page-baslik">Yükleme Detayı</span>
      <div class="ms-auto d-flex gap-2">
        <a href="/modules/bbhb-yukle/liste.html" class="btn btn-sm btn-mis-outline"><i class="bi bi-arrow-left me-1"></i>Geri</a>
      </div>
    </nav>

    <main class="mis-main p-4" id="main-icerik">
      <div class="text-center py-5">
        <div class="spinner-border text-success"></div>
      </div>
    </main>
  </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '/api/bbhb-yukle';
const id = new URLSearchParams(location.search).get('id');
let tumHayvanlar = [];

const yukle = async () => {
  if (!id) { document.getElementById('main-icerik').innerHTML = '<div class="alert alert-danger">ID bulunamadı.</div>'; return; }
  try {
    const r = await fetch(`${API}/${id}`);
    const json = await r.json();
    if (!json.success) throw new Error(json.message);
    const d = json.data;
    tumHayvanlar = d.hayvanlar || [];
    document.getElementById('page-baslik').textContent = d.baslik;
    renderSayfa(d);
  } catch (e) {
    document.getElementById('main-icerik').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
};

const renderSayfa = (d) => {
  const kat = d.ozet.kategoriler || {};
  const katSatirlar = Object.entries(kat)
    .sort((a, b) => b[1].bbhb - a[1].bbhb)
    .map(([k, v]) => `<tr><td>${k}</td><td class="text-end">${v.adet}</td><td class="text-end fw-semibold text-success">${v.bbhb.toFixed(2)}</td></tr>`)
    .join('');

  document.getElementById('main-icerik').innerHTML = `
    <div class="row g-3 mb-4">
      <div class="col-4"><div class="mis-stat"><div class="label">Toplam Hayvan</div><div class="value">${d.ozet.toplam_hayvan}</div></div></div>
      <div class="col-4"><div class="mis-stat"><div class="label">Toplam BBHB</div><div class="value" style="font-size:1.5rem">${d.ozet.toplam_bbhb.toFixed(2)}</div></div></div>
      <div class="col-4"><div class="mis-stat"><div class="label">Hesaplama Tarihi</div><div class="value" style="font-size:1.1rem">${d.hesaplama_tarihi || '-'}</div></div></div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-lg-5">
        <div class="mis-card h-100">
          <div class="mis-card-header"><i class="bi bi-bar-chart"></i><span class="title">Kategori Özeti</span></div>
          <table class="table table-sm mis-table mb-0">
            <thead><tr><th>Kategori</th><th class="text-end">Adet</th><th class="text-end">BBHB</th></tr></thead>
            <tbody>${katSatirlar}</tbody>
            <tfoot><tr class="fw-bold"><td>Toplam</td><td class="text-end">${d.ozet.toplam_hayvan}</td><td class="text-end text-success">${d.ozet.toplam_bbhb.toFixed(2)}</td></tr></tfoot>
          </table>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="mis-card h-100">
          <div class="mis-card-header"><i class="bi bi-info-circle"></i><span class="title">Yükleme Bilgisi</span></div>
          <table class="table table-sm mb-0">
            <tr><td class="text-muted small">Başlık</td><td class="small fw-semibold">${d.baslik}</td></tr>
            <tr><td class="text-muted small">Dosyalar</td><td class="small">${(d.dosyalar||[]).join('<br>')}</td></tr>
            <tr><td class="text-muted small">Yüklenme Tarihi</td><td class="small">${new Date(d.createdAt).toLocaleString('tr-TR')}</td></tr>
            <tr><td class="text-muted small">Hesaplama Tarihi</td><td class="small">${d.hesaplama_tarihi || '-'}</td></tr>
          </table>
        </div>
      </div>
    </div>

    <div class="mis-card">
      <div class="mis-card-header">
        <i class="bi bi-list-ul"></i>
        <span class="title">Hayvan Listesi</span>
        <span class="badge bg-secondary ms-2" id="filtre-adet">${tumHayvanlar.length}</span>
        <div class="ms-auto d-flex gap-2">
          <select class="form-select form-select-sm" id="filtre-tur" style="width:140px">
            <option value="">Tüm türler</option>
            <option>Sığır</option><option>Manda</option><option>Koyun</option><option>Keçi</option>
          </select>
          <select class="form-select form-select-sm" id="filtre-kategori" style="width:200px">
            <option value="">Tüm kategoriler</option>
            ${[...new Set(tumHayvanlar.map(h => h.kategori))].sort().map(k => `<option>${k}</option>`).join('')}
          </select>
          <input type="text" class="form-control form-control-sm" id="filtre-ara" placeholder="Küpe / Sahip ara..." style="width:180px" />
        </div>
      </div>
      <div class="table-responsive" style="max-height:500px;overflow-y:auto;">
        <table class="table table-sm mis-table mb-0">
          <thead style="position:sticky;top:0;z-index:1;">
            <tr>
              <th>Küpe No</th><th>Tür</th><th>Irk</th><th>Cinsiyet</th>
              <th>Doğum</th><th class="text-end">Yaş (ay)</th>
              <th>Kategori</th><th class="text-end">BBHB</th>
              <th>Sahip</th><th>Kaynak</th>
            </tr>
          </thead>
          <tbody id="hayvan-tbody"></tbody>
        </table>
      </div>
    </div>`;

  renderTablo(tumHayvanlar);

  document.getElementById('filtre-tur').addEventListener('change', filtrele);
  document.getElementById('filtre-kategori').addEventListener('change', filtrele);
  document.getElementById('filtre-ara').addEventListener('input', filtrele);
};

const filtrele = () => {
  const tur  = document.getElementById('filtre-tur').value;
  const kat  = document.getElementById('filtre-kategori').value;
  const ara  = document.getElementById('filtre-ara').value.toLowerCase();
  const list = tumHayvanlar.filter(h =>
    (!tur || h.tur === tur) &&
    (!kat || h.kategori === kat) &&
    (!ara || h.kupe_no?.toLowerCase().includes(ara) || h.sahip?.toLowerCase().includes(ara))
  );
  document.getElementById('filtre-adet').textContent = list.length;
  renderTablo(list);
};

const renderTablo = (list) => {
  document.getElementById('hayvan-tbody').innerHTML = list.map(h => `
    <tr>
      <td class="small font-monospace">${h.kupe_no}</td>
      <td class="small">${h.tur}</td>
      <td class="small">${h.irk}</td>
      <td class="small">${h.cinsiyet}</td>
      <td class="small">${h.dogum_tarihi}</td>
      <td class="text-end small">${h.yas_ay >= 0 ? h.yas_ay : '-'}</td>
      <td><span class="grup-badge">${h.kategori}</span></td>
      <td class="text-end fw-semibold text-success small">${h.bbhb.toFixed(2)}</td>
      <td class="small">${h.sahip}</td>
      <td class="small text-muted">${h.kaynak_dosya}</td>
    </tr>`).join('');
};

yukle();
</script>
</body>
</html>
