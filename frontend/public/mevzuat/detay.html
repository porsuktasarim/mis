<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mevzuat Detay - MİS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    .detay-sekme{border:none;background:none;padding:9px 15px;font-size:13px;color:#4a6358;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
    .detay-sekme.active{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:500;}
    .detay-tab{display:none;}.detay-tab.active{display:block;}
    .detay-topbar{background:#fff;border-bottom:1px solid #e2e8e4;display:flex;align-items:center;overflow-x:auto;padding:0 1rem;}
    #pdf-viewer{width:100%;height:80vh;border:none;border-radius:8px;}
    .metin-icerik{white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.8;padding:1rem;background:#f8faf8;border-radius:8px;max-height:75vh;overflow-y:auto;}
    .html-icerik{font-size:13px;line-height:1.8;padding:1rem;background:#f8faf8;border-radius:8px;max-height:75vh;overflow-y:auto;}
    .surum-kart{border:1px solid #e2e8e4;border-radius:8px;padding:.85rem 1rem;margin-bottom:.65rem;}
    .guncelleme-banner{background:#fff8e1;border:1px solid #ffc107;border-radius:10px;padding:1rem;margin-bottom:1rem;}
  </style>
</head>
<body>
<div class="d-flex" id="wrapper">
  <div id="mis-sidebar-mount"></div>
  <div id="page-content" class="flex-grow-1 d-flex flex-column">
    <nav class="navbar mis-topbar px-3">
      <button class="btn btn-sm mis-sidebar-toggle" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
      <span class="mis-topbar-title" id="page-baslik">Mevzuat</span>
      <div class="ms-auto d-flex gap-2">
        <a href="/mevzuat/" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Liste</a>
        <button class="btn btn-sm btn-outline-secondary" onclick="duzenleAc()"><i class="bi bi-pencil me-1"></i>Düzenle</button>
        <button id="btn-yenile" class="btn btn-sm btn-outline-success d-none" onclick="manuelYenile()"><i class="bi bi-arrow-repeat me-1"></i>Yenile</button>
      </div>
    </nav>
    <div class="detay-topbar">
      <button class="detay-sekme active" data-tab="icerik"><i class="bi bi-file-earmark-text me-1"></i>İçerik</button>
      <button class="detay-sekme" data-tab="notlar"><i class="bi bi-sticky me-1"></i>Notlar <span class="badge bg-secondary ms-1" id="not-sayisi">0</span></button>
      <button class="detay-sekme" data-tab="bilgi"><i class="bi bi-info-circle me-1"></i>Bilgiler</button>
      <button class="detay-sekme" data-tab="surumler"><i class="bi bi-clock-history me-1"></i>Eski Sürümler <span class="badge bg-secondary ms-1" id="surum-sayisi">0</span></button>
    </div>

    <main class="mis-main p-4">

      <!-- Güncelleme bildirimi -->
      <div id="guncelleme-banner" class="d-none guncelleme-banner">
        <div class="d-flex align-items-center justify-content-between">
          <div><i class="bi bi-arrow-repeat text-warning me-2"></i><strong>Bu mevzuatta güncelleme tespit edildi.</strong> <span class="text-muted small" id="guncelleme-tarihi"></span></div>
          <button class="btn btn-sm btn-warning" onclick="guncellemeyiOnayla()">Onayla / Kapat</button>
        </div>
      </div>

      <!-- İÇERİK -->
      <div class="detay-tab active" id="tab-icerik">
        <!-- İçinde ara -->
        <div id="ara-bolumu" class="d-none mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="ara-kelime" placeholder="Metin içinde ara..." style="max-width:300px"/>
            <button class="btn btn-sm btn-mis" onclick="icindekiAra()"><i class="bi bi-search me-1"></i>Ara</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="aramayiTemizle()"><i class="bi bi-x"></i></button>
          </div>
          <div id="ara-sonuclar" class="mt-2"></div>
        </div>
        <div id="icerik-alani"><div class="text-center py-5"><div class="spinner-border text-success"></div></div></div>
      </div>

      <!-- NOTLAR -->
      <div class="detay-tab" id="tab-notlar">
        <div class="row g-4">
          <div class="col-lg-8">
            <div id="notlar-listesi"><p class="text-muted text-center py-3 small">Henüz not yok.</p></div>
          </div>
          <div class="col-lg-4">
            <div class="mis-card">
              <div class="mis-card-header"><i class="bi bi-plus"></i><span class="title">Not Ekle</span></div>
              <div class="mb-2">
                <label class="form-label small fw-semibold">Madde/Bölüm (opsiyonel)</label>
                <input type="text" class="form-control form-control-sm" id="n-madde-ref" placeholder="Örn: Madde 5, Bölüm III"/>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-semibold">Renk</label>
                <div class="d-flex gap-2">
                  <button class="not-renk-btn active" data-renk="#FFF9C4" data-adi="Sarı" data-metin="#333333" style="background:#FFF9C4;width:28px;height:28px;border:2px solid #ccc;border-radius:4px;cursor:pointer" onclick="notRenkSec(this)"></button>
                  <button class="not-renk-btn" data-renk="#C8E6C9" data-adi="Yeşil" data-metin="#1b5e20" style="background:#C8E6C9;width:28px;height:28px;border:2px solid transparent;border-radius:4px;cursor:pointer" onclick="notRenkSec(this)"></button>
                  <button class="not-renk-btn" data-renk="#BBDEFB" data-adi="Mavi" data-metin="#0d47a1" style="background:#BBDEFB;width:28px;height:28px;border:2px solid transparent;border-radius:4px;cursor:pointer" onclick="notRenkSec(this)"></button>
                  <button class="not-renk-btn" data-renk="#FFCCBC" data-adi="Turuncu" data-metin="#bf360c" style="background:#FFCCBC;width:28px;height:28px;border:2px solid transparent;border-radius:4px;cursor:pointer" onclick="notRenkSec(this)"></button>
                  <button class="not-renk-btn" data-renk="#F3E5F5" data-adi="Mor" data-metin="#4a148c" style="background:#F3E5F5;width:28px;height:28px;border:2px solid transparent;border-radius:4px;cursor:pointer" onclick="notRenkSec(this)"></button>
                </div>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-semibold">Not *</label>
                <textarea class="form-control form-control-sm" id="n-icerik" rows="4" placeholder="Notunuzu yazın..."></textarea>
              </div>
              <button class="btn btn-mis w-100 btn-sm" onclick="notKaydet()"><i class="bi bi-plus me-1"></i>Not Ekle</button>
            </div>
          </div>
        </div>
      </div>

      <!-- BİLGİLER -->
      <div class="detay-tab" id="tab-bilgi">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="mis-card">
              <div class="mis-card-header"><i class="bi bi-info-circle"></i><span class="title">Mevzuat Bilgileri</span></div>
              <table class="table table-sm mb-0">
                <tr><td class="text-muted small" style="width:35%">Adı</td><td id="b-ad" class="fw-semibold">-</td></tr>
                <tr><td class="text-muted small">Türü</td><td id="b-tur">-</td></tr>
                <tr><td class="text-muted small">Mevzuat No</td><td id="b-no">-</td></tr>
                <tr><td class="text-muted small">R.G. Tarihi</td><td id="b-rg-tarih">-</td></tr>
                <tr><td class="text-muted small">R.G. Sayısı</td><td id="b-rg-sayi">-</td></tr>
                <tr><td class="text-muted small">İçerik Tipi</td><td id="b-tip">-</td></tr>
                <tr><td class="text-muted small">Kaynak</td><td id="b-kaynak">-</td></tr>
                <tr><td class="text-muted small">Son Kontrol</td><td id="b-kontrol">-</td></tr>
                <tr><td class="text-muted small">Etiketler</td><td id="b-etiketler">-</td></tr>
              </table>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="mis-card">
              <div class="mis-card-header"><i class="bi bi-card-text"></i><span class="title">Konu / Özet</span></div>
              <p id="b-konu" class="p-3 small mb-0">-</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ESKİ SÜRÜMLER -->
      <div class="detay-tab" id="tab-surumler">
        <div id="surum-listesi">
          <p class="text-muted text-center py-4 small">Henüz eski sürüm yok.</p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Düzenle Modal -->
<div class="modal fade" id="duzenleModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Mevzuat Düzenle</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label small fw-semibold">Adı *</label><input type="text" class="form-control form-control-sm" id="d-ad"/></div>
        <div class="col-md-4">
          <label class="form-label small fw-semibold">Türü</label>
          <select class="form-select form-select-sm" id="d-tur">
            <option>Kanun</option><option>Yönetmelik</option><option>Tebliğ</option>
            <option>Genelge</option><option>Yönerge</option><option>Karar</option><option>Diğer</option>
          </select>
        </div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Mevzuat No</label><input type="text" class="form-control form-control-sm" id="d-no"/></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">R.G. Tarihi</label><input type="date" class="form-control form-control-sm" id="d-rg-tarih"/></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">R.G. Sayısı</label><input type="text" class="form-control form-control-sm" id="d-rg-sayi"/></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Etiketler</label><input type="text" class="form-control form-control-sm" id="d-etiketler" placeholder="mera, tahsis"/></div>
        <div class="col-12"><label class="form-label small fw-semibold">Konu</label><textarea class="form-control form-control-sm" id="d-konu" rows="3"></textarea></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">İptal</button><button class="btn btn-sm btn-mis" onclick="duzenleKaydet()">Kaydet</button></div>
  </div></div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="mis-toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex"><div class="toast-body fw-semibold" id="toast-msg"></div>
    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div>
  </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '/api/mevzuat';
const id = new URLSearchParams(location.search).get('id');
let mevzuat = null;

const showToast = (msg, type='success') => {
  const el = document.getElementById('mis-toast');
  el.className = `toast align-items-center border-0 text-bg-${type}`;
  document.getElementById('toast-msg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el).show();
};

const TUR_ETIKET = { pdf:'PDF', metin:'Metin', link:'Harici Bağlantı', mevzuat_gov:'mevzuat.gov.tr' };

document.querySelectorAll('.detay-sekme').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.detay-sekme').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.detay-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('tab-' + b.dataset.tab).classList.add('active');
}));

const loadMevzuat = async () => {
  const r = await fetch(`${API}/${id}`);
  const j = await r.json();
  mevzuat = j.data;
  document.getElementById('page-baslik').textContent = mevzuat.ad;
  renderIcerik();
  renderNotlar();
  renderBilgiler();
  renderSurumler();

  // Arama kutusunu sadece metin içerikli mevzuatlarda göster
  if (['metin','mevzuat_gov'].includes(mevzuat.icerik_tipi) && mevzuat.icerik) {
    document.getElementById('ara-bolumu').classList.remove('d-none');
  }

  document.getElementById('btn-rapor-pdf').href = `${API}/${id}/rapor`;
  document.getElementById('btn-rapor-word').href = `${API}/${id}/rapor/word`;
  if (mevzuat.icerik_tipi === 'mevzuat_gov')
    document.getElementById('btn-yenile').classList.remove('d-none');
  if (mevzuat.guncelleme_bekleniyor) {
    document.getElementById('guncelleme-banner').classList.remove('d-none');
    document.getElementById('guncelleme-tarihi').textContent =
      mevzuat.guncelleme_tarihi ? new Date(mevzuat.guncelleme_tarihi).toLocaleString('tr-TR') : '';
  }

  // Hash ile notlar sekmesine git
  if (location.hash === '#notlar') {
    document.querySelectorAll('.detay-sekme').forEach(b => b.classList.toggle('active', b.dataset.tab === 'notlar'));
    document.querySelectorAll('.detay-tab').forEach(p => p.classList.toggle('active', p.id === 'tab-notlar'));
  }
};

const renderIcerik = () => {
  const el = document.getElementById('icerik-alani');

  if (mevzuat.icerik_tipi === 'pdf' && mevzuat.drive_file_id) {
    el.innerHTML = `<iframe id="pdf-viewer" src="/api/mevzuat/${id}/pdf" title="${mevzuat.ad}"></iframe>`;
  } else if (mevzuat.icerik_tipi === 'link' && mevzuat.harici_link) {
    el.innerHTML = `
      <div class="text-center py-4">
        <i class="bi bi-link-45deg fs-1 text-secondary d-block mb-2"></i>
        <p class="fw-semibold">${mevzuat.ad}</p>
        <a href="${mevzuat.harici_link}" target="_blank" class="btn btn-mis">
          <i class="bi bi-box-arrow-up-right me-2"></i>Bağlantıyı Aç
        </a>
        <p class="small text-muted mt-2">${mevzuat.harici_link}</p>
      </div>`;
  } else if (mevzuat.html_icerik) {
    el.innerHTML = `<div class="html-icerik">${mevzuat.html_icerik}</div>`;
  } else if (mevzuat.icerik) {
    el.innerHTML = `<pre class="metin-icerik">${mevzuat.icerik}</pre>`;
  } else {
    el.innerHTML = '<p class="text-muted text-center py-4 small">İçerik bulunamadı.</p>';
  }
};

const renderBilgiler = () => {
  document.getElementById('b-ad').textContent = mevzuat.ad;
  document.getElementById('b-tur').innerHTML = `<span class="badge bg-secondary">${mevzuat.tur}</span>`;
  document.getElementById('b-no').textContent = mevzuat.mevzuat_no || '-';
  document.getElementById('b-rg-tarih').textContent = mevzuat.resmi_gazete_tarihi ? new Date(mevzuat.resmi_gazete_tarihi).toLocaleDateString('tr-TR') : '-';
  document.getElementById('b-rg-sayi').textContent = mevzuat.resmi_gazete_sayisi || '-';
  document.getElementById('b-tip').textContent = TUR_ETIKET[mevzuat.icerik_tipi] || mevzuat.icerik_tipi;
  document.getElementById('b-kaynak').innerHTML = mevzuat.mevzuat_gov_url
    ? `<a href="${mevzuat.mevzuat_gov_url}" target="_blank" class="small">${mevzuat.mevzuat_gov_url}</a>`
    : mevzuat.harici_link ? `<a href="${mevzuat.harici_link}" target="_blank" class="small">${mevzuat.harici_link}</a>` : '-';
  document.getElementById('b-kontrol').textContent = mevzuat.son_kontrol ? new Date(mevzuat.son_kontrol).toLocaleString('tr-TR') : '-';
  document.getElementById('b-etiketler').innerHTML = (mevzuat.etiketler||[]).map(e=>`<span class="badge bg-secondary me-1">${e}</span>`).join('') || '-';
  document.getElementById('b-konu').textContent = mevzuat.konu || '-';
};

const renderSurumler = () => {
  const surumler = mevzuat.surumler || [];
  document.getElementById('surum-sayisi').textContent = surumler.length;
  if (!surumler.length) return;
  document.getElementById('surum-listesi').innerHTML = [...surumler].reverse().map((s, idx) => `
    <div class="surum-kart">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <div><strong class="small">Sürüm ${surumler.length - idx}</strong><span class="text-muted small ms-2">${new Date(s.createdAt).toLocaleString('tr-TR')}</span></div>
        <button class="btn btn-xs btn-outline-secondary" onclick="surumuGoster(${surumler.length - 1 - idx})"><i class="bi bi-eye me-1"></i>Görüntüle</button>
      </div>
      ${s.degisiklik_notu ? `<div class="small text-muted"><i class="bi bi-info-circle me-1"></i>${s.degisiklik_notu}</div>` : ''}
    </div>`).join('');
};

// ── Notlar ────────────────────────────────────────────────
let secilenRenk = { renk: '#FFF9C4', adi: 'Sarı', metin: '#333333' };

window.notRenkSec = (btn) => {
  document.querySelectorAll('.not-renk-btn').forEach(b => b.style.border = '2px solid transparent');
  btn.style.border = '2px solid #0F6E56';
  secilenRenk = { renk: btn.dataset.renk, adi: btn.dataset.adi, metin: btn.dataset.metin };
};

const renderNotlar = () => {
  const notlar = mevzuat.notlar || [];
  document.getElementById('not-sayisi').textContent = notlar.length;
  document.getElementById('notlar-listesi').innerHTML = notlar.length ? notlar.map(n => `
    <div class="mis-card mb-2" style="border-left:4px solid ${n.renk};background:${n.renk}22">
      <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1">
          ${n.madde_ref ? `<div class="small fw-semibold text-muted mb-1"><i class="bi bi-bookmark me-1"></i>${n.madde_ref}</div>` : ''}
          <div class="small">${n.icerik}</div>
          <div class="text-muted mt-1" style="font-size:11px">${new Date(n.createdAt).toLocaleString('tr-TR')}</div>
        </div>
        <div class="d-flex gap-1 ms-2">
          <button class="btn btn-xs btn-outline-danger" onclick="notSil('${n._id}')"><i class="bi bi-trash"></i></button>
        </div>
      </div>
    </div>`).join('')
    : '<p class="text-muted text-center py-3 small">Henüz not yok.</p>';
};

window.notKaydet = async () => {
  const icerik = document.getElementById('n-icerik').value.trim();
  if (!icerik) { showToast('Not içeriği zorunlu.','warning'); return; }
  const veri = {
    icerik,
    madde_ref: document.getElementById('n-madde-ref').value.trim(),
    renk: secilenRenk.renk, renk_adi: secilenRenk.adi, metin_rengi: secilenRenk.metin,
  };
  const r = await fetch(`${API}/${id}/notlar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(veri) });
  const j = await r.json();
  if (j.success) {
    document.getElementById('n-icerik').value = '';
    document.getElementById('n-madde-ref').value = '';
    await loadMevzuat();
    showToast('Not eklendi.');
  } else showToast(j.message,'danger');
};

window.notSil = async (notId) => {
  if (!confirm('Not silinecek?')) return;
  const r = await fetch(`${API}/${id}/notlar/${notId}`, { method:'DELETE' });
  if ((await r.json()).success) { await loadMevzuat(); showToast('Not silindi.'); }
};

// ── İçinde Ara ────────────────────────────────────────────
window.icindekiAra = async () => {
  const kelime = document.getElementById('ara-kelime').value.trim();
  if (!kelime) return;
  const r = await fetch(`${API}/${id}/ara?kelime=${encodeURIComponent(kelime)}`);
  const j = await r.json();
  const el = document.getElementById('ara-sonuclar');

  if (!j.toplam) {
    el.innerHTML = `<div class="alert alert-info py-2 small">«${kelime}» için sonuç bulunamadı.</div>`;
    return;
  }

  el.innerHTML = `<div class="mb-2 small text-muted"><strong>${j.toplam}</strong> sonuç bulundu:</div>` +
    j.data.map(s => {
      const vurgu = (metin) => metin.replace(new RegExp(kelime.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m => `<mark>${m}</mark>`);
      if (s.tip === 'metin') return `
        <div class="border rounded p-2 mb-1 small">
          <div class="text-muted mb-1">Satır ${s.satir_no}</div>
          <div>${s.oncesi ? `<span class="text-muted">...${s.oncesi}</span>` : ''}${vurgu(s.eslesme)}${s.sonrasi ? `<span class="text-muted">${s.sonrasi}...</span>` : ''}</div>
        </div>`;
      return `
        <div class="border rounded p-2 mb-1 small" style="background:#fffde7">
          <div class="text-muted mb-1"><i class="bi bi-sticky me-1"></i>Not${s.madde_ref?' — '+s.madde_ref:''}</div>
          <div>${vurgu(s.eslesme)}</div>
        </div>`;
    }).join('');
};

window.aramayiTemizle = () => {
  document.getElementById('ara-kelime').value = '';
  document.getElementById('ara-sonuclar').innerHTML = '';
};

document.getElementById('ara-kelime')?.addEventListener('keydown', e => { if(e.key==='Enter') icindekiAra(); });

window.surumuGoster = (idx) => {
  const s = mevzuat.surumler[idx];
  if (!s) return;
  const el = document.getElementById('icerik-alani');
  const icerik = s.html_icerik
    ? `<div class="html-icerik">${s.html_icerik}</div>`
    : s.icerik ? `<pre class="metin-icerik">${s.icerik}</pre>` : '<p class="text-muted small">İçerik yok.</p>';
  el.innerHTML = `
    <div class="alert alert-warning py-2 small mb-2">
      <i class="bi bi-clock-history me-1"></i>Eski sürüm görüntüleniyor — ${new Date(s.createdAt).toLocaleString('tr-TR')}
      <button class="btn btn-xs btn-outline-secondary ms-2" onclick="renderIcerik()">Güncel Sürüme Dön</button>
    </div>
    ${icerik}`;
  document.querySelectorAll('.detay-sekme').forEach(b => b.classList.toggle('active', b.dataset.tab === 'icerik'));
  document.querySelectorAll('.detay-tab').forEach(p => p.classList.toggle('active', p.id === 'tab-icerik'));
};

window.manuelYenile = async () => {
  showToast('Yenileniyor...', 'secondary');
  try {
    const r = await fetch(`${API}/${id}/yenile`, { method:'POST' });
    const j = await r.json();
    if (j.success) {
      showToast(j.degisiklik ? 'Değişiklik tespit edildi, güncellendi.' : 'Değişiklik yok.');
      await loadMevzuat();
    } else showToast(j.message,'danger');
  } catch { showToast('Hata.','danger'); }
};

window.guncellemeyiOnayla = async () => {
  const r = await fetch(`${API}/${id}/onayla`, { method:'POST' });
  const j = await r.json();
  if (j.success) { document.getElementById('guncelleme-banner').classList.add('d-none'); showToast('Güncelleme onaylandı.'); }
};

window.duzenleAc = () => {
  document.getElementById('d-ad').value = mevzuat.ad;
  document.getElementById('d-tur').value = mevzuat.tur;
  document.getElementById('d-no').value = mevzuat.mevzuat_no || '';
  document.getElementById('d-rg-tarih').value = mevzuat.resmi_gazete_tarihi ? new Date(mevzuat.resmi_gazete_tarihi).toISOString().slice(0,10) : '';
  document.getElementById('d-rg-sayi').value = mevzuat.resmi_gazete_sayisi || '';
  document.getElementById('d-konu').value = mevzuat.konu || '';
  document.getElementById('d-etiketler').value = (mevzuat.etiketler||[]).join(', ');
  new bootstrap.Modal(document.getElementById('duzenleModal')).show();
};

window.duzenleKaydet = async () => {
  const veri = {
    ad: document.getElementById('d-ad').value,
    tur: document.getElementById('d-tur').value,
    mevzuat_no: document.getElementById('d-no').value,
    resmi_gazete_tarihi: document.getElementById('d-rg-tarih').value || null,
    resmi_gazete_sayisi: document.getElementById('d-rg-sayi').value,
    konu: document.getElementById('d-konu').value,
    etiketler: document.getElementById('d-etiketler').value.split(',').map(e=>e.trim()).filter(Boolean),
  };
  const r = await fetch(`${API}/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(veri) });
  const j = await r.json();
  if (j.success) { bootstrap.Modal.getInstance(document.getElementById('duzenleModal')).hide(); await loadMevzuat(); showToast('Güncellendi.'); }
  else showToast(j.message,'danger');
};

document.addEventListener('DOMContentLoaded', loadMevzuat);
</script>
<style>.btn-xs{padding:2px 6px;font-size:12px;}</style>
</body>
</html>
